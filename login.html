<!DOCTYPE html>
<html>

<head>
    <title>Login - Japan Quest</title>
    <link rel="stylesheet" href="landing style.css">
</head>

<body>
<div class="loginBox">

    <h1>JAPAN QUEST</h1>

    <p class="welcome">
        Welcome Back, Adventurer
    </p>

    <input
        id="email"
        type="email"
        placeholder="Email">

    <br><br>

   <div class="passwordBox">

    <input
        id="password"
        type="password"
        placeholder="Password">

    <span
        class="eye"
        onclick="togglePassword()">

        👁

    </span>

    </div>

    <p class="forgot" onclick="forgotPassword()">
        Forgot Password?
    </p>

    <button class="mainBtn" onclick="login()">
        BEGIN JOURNEY
    </button>

    <hr>

    <p>
        New Adventurer?
    </p>

    <button class="secondaryBtn"
        onclick="location.href='register.html'">

        CREATE CHARACTER

    </button>

</div>

<script type="module" src="login.js"></script>

</body>

</html>
